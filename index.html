<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>마케팅 툴 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F7F7F5;color:#1a1a1a;min-height:100vh}
header{background:#fff;border-bottom:2px solid #E8651A;padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(232,101,26,.08)}
.logo{font-size:18px;font-weight:700;letter-spacing:-.03em;color:#E8651A;text-decoration:none;cursor:pointer;display:flex;align-items:center;gap:8px}
.logo::before{content:'';width:6px;height:24px;background:#E8651A;border-radius:3px;display:inline-block}
.logo:hover{opacity:.85}
.header-logo img{height:30px;display:block}
.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.hero{text-align:center;padding:2.5rem 0 0}
.hero h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:.5rem;color:#111}
.hero h1 span{color:#E8651A}
.hero p{font-size:14px;color:#999}
.search-wrap{max-width:580px;margin:1.25rem auto 3rem;display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(232,101,26,.12);border:1.5px solid #E8651A}
.search-wrap input{flex:1;padding:13px 18px;border:none;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none}
.search-wrap input::placeholder{color:#bbb}
.search-wrap button{padding:13px 24px;background:#E8651A;color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.search-wrap button:hover{background:#C45410}
.ai-result{background:#fff;border:1.5px solid #F4B48A;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;display:none}
.ai-result.on{display:block}
.ai-label{font-size:11px;color:#E8651A;margin-bottom:8px;font-weight:600}
.ai-pills{display:flex;gap:6px;flex-wrap:wrap}
.ai-pill{padding:5px 12px;border-radius:20px;font-size:12px;background:#FEF0E8;border:1px solid #F4B48A;color:#C45410;cursor:pointer;text-decoration:none;transition:all .15s;display:inline-block;font-weight:500}
.ai-pill:hover{background:#E8651A;color:#fff;border-color:#E8651A}
.layout{display:grid;grid-template-columns:210px 1fr;gap:16px;align-items:stretch}
.sidebar{background:#fff;border:1.5px solid #EEE;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;flex-direction:column}
.sidebar-char{overflow:hidden;flex-shrink:0;margin-top:auto}
.sidebar-char img{width:100%;display:block}
.sidebar-header{padding:.75rem 1rem;font-size:10px;color:#E8651A;border-bottom:1px solid #F5F0EB;letter-spacing:.1em;text-transform:uppercase;font-weight:700;background:#FEF8F5}
.prod-item{display:flex;align-items:center;gap:8px;padding:.6rem 1rem;cursor:pointer;font-size:13px;color:#555;border-bottom:1px solid #F8F4F0;transition:all .1s;position:relative}
.prod-item:last-child{border-bottom:none}
.prod-item:hover{background:#FEF8F5;color:#E8651A}
.prod-item.active{background:#FEF0E8;color:#C45410;font-weight:600;border-left:3px solid #E8651A;padding-left:calc(1rem - 3px)}
.prod-item.pinned-item{background:#FFFAF7}
.prod-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pin-btn{margin-left:auto;font-size:11px;padding:2px 5px;border-radius:4px;cursor:pointer;color:#ddd;flex-shrink:0;visibility:hidden;border:none;background:none;transition:color .15s}
.pin-btn.is-pinned{color:#E8651A;visibility:visible}
.prod-item:hover .pin-btn{visibility:visible}
.pin-btn:hover{color:#E8651A;background:#FEF0E8}
.section-divider{font-size:10px;color:#E8651A;padding:.4rem 1rem;background:#FEF8F5;border-bottom:1px solid #F5F0EB;letter-spacing:.06em;font-weight:600}
.section-divider.gray{color:#aaa;background:#F8F8F8}
.main{background:#fff;border:1.5px solid #EEE;border-radius:14px;padding:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:.875rem;border-bottom:2px solid #FEF0E8}
.main-title{font-size:15px;font-weight:700;letter-spacing:-.02em;color:#111}
.main-meta{font-size:11px;color:#bbb;background:#F8F4F0;padding:3px 8px;border-radius:20px}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.folder{border:1.5px solid #EEE;border-radius:14px;padding:.875rem;cursor:pointer;transition:all .2s;background:#FAFAF8;text-decoration:none;display:block;color:inherit;position:relative;overflow:hidden}
.folder::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#E8651A,#F4A261);transform:scaleX(0);transform-origin:left;transition:transform .2s}
.folder:hover{border-color:#F4B48A;background:#FEF8F5;transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,101,26,.1)}
.folder:hover::after{transform:scaleX(1)}
.folder.linked{border-color:#F4B48A;background:#FFFAF8}
.folder.linked:hover{border-color:#E8651A;box-shadow:0 6px 20px rgba(232,101,26,.15)}
.folder.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;background:#F7F7F5;filter:grayscale(1)}
.folder-icon{font-size:22px;margin-bottom:10px}
.folder-name{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.4}
.folder-sub{font-size:10px;margin-top:4px}
.pin-badge{position:absolute;top:6px;right:6px;font-size:11px}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
.group-line{height:1px;background:#F0EDE8;margin:2px 1rem}
.section-divider{font-size:10px;padding:.4rem 1rem;border-bottom:1px solid #F5F0EB;letter-spacing:.06em;font-weight:600}
.section-divider.orange{color:#E8651A;background:#FEF8F5}
.section-divider.gray{color:#aaa;background:#F8F8F8}
</style>
</head>

var pinnedIds = (function(){
  try { return JSON.parse(localStorage.getItem('mhub_pins') || '[]'); } catch(e) { return []; }
})();
var currentProd = 'all';

function getUrl(pid, folder) {
  return (fileUrls[pid] && fileUrls[pid][folder]) ? fileUrls[pid][folder] : null;
}

function togglePin(id) {
  var idx = pinnedIds.indexOf(id);
  if (idx > -1) pinnedIds.splice(idx, 1);
  else pinnedIds.push(id);
  try { localStorage.setItem('mhub_pins', JSON.stringify(pinnedIds)); } catch(e) {}
  renderSidebar();
  if (currentProd === 'all') renderFolders('all');
}

function getSorted() {
  var pinned = products.slice(1).filter(function(p){ return pinnedIds.indexOf(p.id) > -1; });
  var rest   = products.slice(1).filter(function(p){ return pinnedIds.indexOf(p.id) === -1; });
  return [products[0]].concat(pinned).concat(rest);
}

function renderSidebar() {
  var sorted = getSorted();
  var hasPins = pinnedIds.length > 0;
  var html = '';
  var passedPins = false;
  sorted.forEach(function(p, i) {
    if (p.id === 'all') {
      html += '<div class="prod-item' + (currentProd==='all'?' active':'') + '" onclick="selectProd(\'all\')">전체</div>';
      if (hasPins) html += '<div class="section-divider">📌 고정된 상품</div>';
      return;
    }
    var isPinned = pinnedIds.indexOf(p.id) > -1;
    if (hasPins && !isPinned && !passedPins) {
      passedPins = true;
      html += '<div class="section-divider gray">전체 상품</div>';
    }
    var dotIdx = 0;
    for (var k=0; k<products.length; k++) { if (products[k].id===p.id) { dotIdx=k-1; break; } }
    var dotColor = DOTS[dotIdx] || '#ccc';
    html += '<div class="prod-item' + (isPinned?' pinned-item':'') + (p.id===currentProd?' active':'') + '" onclick="selectProd(\'' + p.id + '\')">'
      + '<div class="prod-dot" style="background:' + dotColor + '"></div>'
      + '<span style="flex:1">' + p.name + '</span>'
      + '<button class="pin-btn' + (isPinned?' is-pinned':'') + '" onclick="event.stopPropagation();togglePin(\'' + p.id + '\')" title="' + (isPinned?'고정 해제':'즐겨찾기') + '">'
      + (isPinned ? '📌' : '📌')
      + '</button></div>';
  });
  document.getElementById('prodList').innerHTML = html;
}

function renderFolders(pid) {
  var pObj = null;
  for (var k=0; k<products.length; k++) { if (products[k].id===pid) { pObj=products[k]; break; } }
  document.getElementById('mainTitle').textContent = pObj ? pObj.name : '전체';
  var grid = document.getElementById('folderGrid');
  grid.innerHTML = '';

  if (pid === 'all') {
    document.getElementById('mainMeta').textContent = (products.length-1) + '개 상품';
    var sorted = getSorted().slice(1);
    sorted.forEach(function(p) {
      var folders = productFolders[p.id] || [];
      var linked = 0;
      folders.forEach(function(f){ if(getUrl(p.id,f)) linked++; });
      var dotIdx = 0;
      for (var k=0; k<products.length; k++) { if (products[k].id===p.id) { dotIdx=k-1; break; } }
      var isPinned = pinnedIds.indexOf(p.id) > -1;
      var div = document.createElement('div');
      div.className = 'folder' + (linked===0?' disabled':'');
      div.innerHTML = (isPinned?'<div class="pin-badge">📌</div>':'')
        + '<div style="width:28px;height:28px;border-radius:50%;background:' + (DOTS[dotIdx]||'#ccc') + ';margin-bottom:8px"></div>'
        + '<div class="folder-name">' + p.name + '</div>'
        + '<div class="folder-sub" style="color:#aaa">' + folders.length + '개 폴더 · ' + (linked>0?linked+'개 연결':'파일 없음') + '</div>';
      if (linked > 0) {
        div.style.cursor = 'pointer';
        (function(pid){ div.addEventListener('click', function(){ selectProd(pid); }); })(p.id);
      }
      grid.appendChild(div);
    });
  } else {
    var folders = productFolders[pid] || [];
    document.getElementById('mainMeta').textContent = folders.length + '개 폴더';
    folders.forEach(function(f) {
      var url = getUrl(pid, f);
      var icon = folderIcons[f] || '📁';
      if (url) {
        var a = document.createElement('a');
        a.className = 'folder linked';
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = '<div class="folder-icon">' + icon + '</div>'
          + '<div class="folder-name">' + f + '</div>'
          + '<div class="folder-sub" style="color:#E8651A">드라이브 열기 ↗</div>';
        grid.appendChild(a);
      } else {
        var div = document.createElement('div');
        div.className = 'folder disabled';
        div.innerHTML = '<div class="folder-icon">' + icon + '</div>'
          + '<div class="folder-name">' + f + '</div>'
          + '<div class="folder-sub" style="color:#ccc">파일 없음</div>';
        grid.appendChild(div);
      }
    });
  }
}

function selectProd(id) {
  currentProd = id;
  history.pushState({prod:id}, '', id==='all' ? location.pathname : location.pathname + '#' + id);
  renderSidebar();
  renderFolders(id);
}

window.addEventListener('popstate', function(e) {
  var id = (e.state && e.state.prod) || 'all';
  currentProd = id;
  renderSidebar();
  renderFolders(id);
});

function doSearch() {
  var q = document.getElementById('qi').value.trim();
  if (!q) return;
  var kw = q.toLowerCase();
  var kwMap = {'로고':'로고·PI·CI','pi':'로고·PI·CI','ci':'로고·PI·CI','제안':'제안서·소개서','소개서':'제안서·소개서','브로셔':'브로셔·리플렛','리플렛':'브로셔·리플렛','sns':'SNS 콘텐츠','콘텐츠':'SNS 콘텐츠','영상':'영상','큐카드':'큐카드','보도자료':'보도자료','통합':'상품 통합 브로슈어','회사소개':'웹케시 회사소개서'};
  var matchedFolder = null;
  var kwKeys = Object.keys(kwMap);
  for (var i=0; i<kwKeys.length; i++) { if (kw.indexOf(kwKeys[i])>-1) { matchedFolder=kwMap[kwKeys[i]]; break; } }
  var results = [];
  products.slice(1).forEach(function(p) {
    var pn = p.name.toLowerCase();
    if (kw.indexOf(pn)>-1 || pn.indexOf(kw.split(' ')[0])>-1) {
      var folders = productFolders[p.id] || [];
      var targets = matchedFolder ? folders.filter(function(f){ return f===matchedFolder; }) : folders;
      targets.forEach(function(f) {
        var url = getUrl(p.id, f);
        if (url) results.push({prod:p.name, folder:f, url:url});
      });
    }
  });
  document.getElementById('aiLabel').textContent = '"' + q + '" 관련 추천 ' + results.length + '개';
  var pillsHTML = '';
  if (results.length === 0) {
    pillsHTML = '<span style="font-size:12px;color:#aaa">관련 툴을 찾지 못했어요.</span>';
  } else {
    results.slice(0,8).forEach(function(r) {
      pillsHTML += '<a class="ai-pill" href="' + r.url + '" target="_blank" rel="noopener noreferrer">' + r.prod + ' · ' + r.folder + ' ↗</a>';
    });
  }
  document.getElementById('aiPills').innerHTML = pillsHTML;
  document.getElementById('aiBox').classList.add('on');
}

document.getElementById('qi').addEventListener('input', function(){ doSearch(); });
document.getElementById('qi').addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(); });
renderSidebar();
renderFolders('all');
</script>
