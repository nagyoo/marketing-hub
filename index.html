<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>마케팅 툴 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F7F7F5;color:#1a1a1a;min-height:100vh}
header{background:#fff;border-bottom:1px solid #E8E8E4;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;letter-spacing:-.02em;color:#534AB7;text-decoration:none;cursor:pointer}
.logo:hover{opacity:.8}
.header-logo img{height:32px;display:block}
.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.hero{text-align:center;padding:2.5rem 0 2rem}
.hero h1{font-size:26px;font-weight:600;letter-spacing:-.03em;margin-bottom:.5rem}
.hero p{font-size:14px;color:#888}
.search-wrap{max-width:560px;margin:0 auto 2rem;display:flex;gap:8px}
.search-wrap input{flex:1;padding:11px 16px;border:1px solid #E0E0DA;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:#534AB7;box-shadow:0 0 0 3px rgba(83,74,183,.08)}
.search-wrap button{padding:11px 20px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:background .15s}
.search-wrap button:hover{background:#3C3489}
.ai-result{background:#fff;border:1px solid #E8E8E4;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;display:none}
.ai-result.on{display:block}
.ai-label{font-size:11px;color:#888;margin-bottom:8px}
.ai-pills{display:flex;gap:6px;flex-wrap:wrap}
.ai-pill{padding:5px 12px;border-radius:8px;font-size:12px;background:#F7F7F5;border:1px solid #E0E0DA;color:#1a1a1a;cursor:pointer;text-decoration:none;transition:border-color .15s;display:inline-block}
.ai-pill:hover{border-color:#534AB7;color:#534AB7}
.layout{display:grid;grid-template-columns:210px 1fr;gap:16px;align-items:start}
.sidebar{background:#fff;border:1px solid #E8E8E4;border-radius:14px;overflow:hidden}
.sidebar-header{padding:.625rem 1rem;font-size:11px;color:#888;border-bottom:1px solid #E8E8E4;letter-spacing:.06em;text-transform:uppercase}
.prod-item{display:flex;align-items:center;gap:8px;padding:.55rem 1rem;cursor:pointer;font-size:13px;color:#555;border-bottom:1px solid #F0F0EC;transition:background .1s}
.prod-item:last-child{border-bottom:none}
.prod-item:hover{background:#F7F7F5}
.prod-item.active{background:#EEEDFE;color:#3C3489;font-weight:500}
.prod-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{background:#fff;border:1px solid #E8E8E4;border-radius:14px;padding:1.25rem}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:.875rem;border-bottom:1px solid #F0F0EC}
.main-title{font-size:15px;font-weight:600;letter-spacing:-.02em}
.main-meta{font-size:11px;color:#aaa}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.folder{border:1px solid #E8E8E4;border-radius:12px;padding:.875rem;cursor:pointer;transition:all .15s;background:#FAFAF8;text-decoration:none;display:block;color:inherit}
.folder:hover{border-color:#C5C2E8;background:#EEEDFE}
.folder.linked{border-color:#C5C2E8}
.folder.linked:hover{border-color:#534AB7;box-shadow:0 2px 12px rgba(83,74,183,.1)}
.folder-icon{font-size:20px;margin-bottom:8px}
.folder-name{font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.4}
.folder-sub{font-size:10px;margin-top:4px}
.back-btn{font-size:12px;color:#534AB7;cursor:pointer;background:none;border:none;padding:0;margin-bottom:1rem;font-family:inherit;display:none}
.back-btn.on{display:inline-block}
.back-btn:hover{text-decoration:underline}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
</style>
</head>

let currentProd='all';

function getUrl(pid,folder){return fileUrls[pid]?.[folder]||null;}

function renderSidebar(){
  document.getElementById('prodList').innerHTML=products.map((p,i)=>{
    const dot=p.id==='all'?'':`<div class="prod-dot" style="background:${DOTS[i-1]||'#ccc'}"></div>`;
    return `<div class="prod-item${p.id===currentProd?' active':''}" onclick="selectProd('${p.id}')">${dot}${p.name}</div>`;
  }).join('');
}

function renderFolders(pid){
  const pName=products.find(p=>p.id===pid)?.name||'전체';
  document.getElementById('mainTitle').textContent=pName;

  if(pid==='all'){
    document.getElementById('mainMeta').textContent=(products.length-1)+'개 상품';
    document.getElementById('folderGrid').innerHTML=products.slice(1).map((p,i)=>{
      const folders=productFolders[p.id]||[];
      const linked=folders.filter(f=>getUrl(p.id,f)).length;
      return `<div class="folder" onclick="selectProd('${p.id}')">
        <div style="width:28px;height:28px;border-radius:50%;background:${DOTS[i]||'#ccc'};margin-bottom:8px"></div>
        <div class="folder-name">${p.name}</div>
        <div class="folder-sub" style="color:#aaa">${folders.length}개 폴더 · ${linked}개 연결</div>
      </div>`;
    }).join('');
  } else {
    const folders=productFolders[pid]||[];
    document.getElementById('mainMeta').textContent=folders.length+'개 폴더';
    document.getElementById('folderGrid').innerHTML=folders.map(f=>{
      const url=getUrl(pid,f);
      const icon=folderIcons[f]||'📁';
      if(url){
        return `<a class="folder linked" href="${url}" target="_blank" rel="noopener noreferrer">
          <div class="folder-icon">${icon}</div>
          <div class="folder-name">${f}</div>
          <div class="folder-sub" style="color:#534AB7">드라이브 열기 ↗</div>
        </a>`;
      }
      return `<div class="folder">
        <div class="folder-icon">${icon}</div>
        <div class="folder-name">${f}</div>
        <div class="folder-sub" style="color:#ccc">준비중</div>
      </div>`;
    }).join('');
  }
}

function selectProd(id){
  currentProd=id;
  history.pushState({prod:id},'',id==='all'?'#':'#'+id);
  renderSidebar();
  renderFolders(id);
}

window.addEventListener('popstate',function(e){
  const id=(e.state&&e.state.prod)||'all';
  currentProd=id;
  renderSidebar();
  renderFolders(id);
});

function doSearch(){
  const q=document.getElementById('qi').value.trim();
  if(!q)return;
  const kw=q.toLowerCase();
  const results=[];
  const kwMap={'로고':'로고·PI·CI','pi':'로고·PI·CI','ci':'로고·PI·CI','제안':'제안서·소개서','소개서':'제안서·소개서','브로셔':'브로셔·리플렛','리플렛':'브로셔·리플렛','sns':'SNS 콘텐츠','콘텐츠':'SNS 콘텐츠','영상':'영상','큐카드':'큐카드','캐릭터':'캐릭터','보도자료':'보도자료','통합':'상품 통합 브로슈어','회사소개':'웹케시 회사소개서'};
  const matchedFolder=Object.entries(kwMap).find(([k])=>kw.includes(k))?.[1];

  products.slice(1).forEach(p=>{
    const prodMatch=kw.includes(p.name.toLowerCase())||p.name.toLowerCase().includes(kw.replace(/\s.*$/,''));
    if(prodMatch){
      const folders=productFolders[p.id]||[];
      const targets=matchedFolder?folders.filter(f=>f===matchedFolder):folders;
      targets.forEach(f=>{
        const url=getUrl(p.id,f);
        results.push({prod:p.name,folder:f,pid:p.id,url});
      });
    }
  });

  document.getElementById('aiLabel').textContent='"'+q+'" 관련 추천 '+results.length+'개';
  document.getElementById('aiPills').innerHTML=results.length===0
    ?'<span style="font-size:12px;color:#aaa">관련 툴을 찾지 못했어요. 상품명과 툴 종류를 함께 입력해보세요.</span>'
    :results.slice(0,8).map(r=>r.url
      ?`<a class="ai-pill" href="${r.url}" target="_blank" rel="noopener noreferrer">${r.prod} · ${r.folder} ↗</a>`
      :`<div class="ai-pill" onclick="selectProd('${r.pid}')">${r.prod} · ${r.folder}</div>`
    ).join('');
  document.getElementById('aiBox').classList.add('on');
}

document.getElementById('qi').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
renderSidebar();
renderFolders('all');
</script>
